services:
  - type: web
    name: indahl
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: BUDDY_WORKER_URL
        value: https://buddy-companion.kory-indahl.workers.dev
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
    domains:
      - indahl.ai
