<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nora</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}
body {
  font-family: 'Georgia', 'Garamond', 'Times New Roman', serif;
  background: #f5f0eb;
  color: #2a2420;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: background-color 3s ease;
  -webkit-tap-highlight-color: transparent;
}
#main {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  width: 100%;
  padding: 2rem;
}
/* Victorian mirror frame */
#mirror-frame {
  position: relative;
  width: 240px;
  height: 300px;
  padding: 16px;
  background: linear-gradient(145deg, #c9a84c, #8b6914, #c9a84c, #a07820, #dabb5e, #8b6914);
  border-radius: 50% 50% 48% 48% / 55% 55% 45% 45%;
  box-shadow:
    0 0 0 3px #5a3e0a,
    0 0 0 6px #8b6914,
    0 4px 20px rgba(0,0,0,0.4),
    inset 0 0 15px rgba(0,0,0,0.3);
  cursor: pointer;
  touch-action: manipulation;
  transition: all 0.3s ease;
}
#mirror-frame:hover {
  box-shadow:
    0 0 0 3px #5a3e0a,
    0 0 0 6px #8b6914,
    0 4px 30px rgba(0,0,0,0.5),
    inset 0 0 15px rgba(0,0,0,0.3);
}
#mirror-frame:active {
  transform: scale(0.98);
}
/* The glass */
#talk-btn {
  width: 100%;
  height: 100%;
  border-radius: 50% 50% 46% 46% / 55% 55% 43% 43%;
  border: 1px solid rgba(255,255,255,0.3);
  background: linear-gradient(170deg, rgba(220,225,235,0.9), rgba(190,195,210,0.7), rgba(210,215,225,0.8));
  color: #3a3530;
  font-family: 'Georgia', serif;
  font-size: 24px;
  font-weight: 400;
  font-style: italic;
  cursor: pointer;
  transition: all 0.5s ease;
  line-height: 1.4;
  -webkit-user-select: none;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  /* Mirror shimmer */
  background-image:
    linear-gradient(170deg, transparent 30%, rgba(255,255,255,0.15) 45%, transparent 55%);
}
#talk-btn:hover {
  background: linear-gradient(170deg, rgba(225,230,240,0.95), rgba(200,205,218,0.8), rgba(215,220,230,0.85));
}
#mirror-frame.listening #talk-btn {
  background: linear-gradient(170deg, rgba(200,235,220,0.9), rgba(180,215,200,0.7), rgba(195,225,210,0.8));
  animation: mirror-breathe 3s ease-in-out infinite;
}
#mirror-frame.speaking #talk-btn {
  background: linear-gradient(170deg, rgba(210,215,240,0.9), rgba(190,195,225,0.7), rgba(200,210,235,0.8));
}
#mirror-frame.thinking #talk-btn {
  background: linear-gradient(170deg, rgba(240,225,200,0.9), rgba(220,205,180,0.7), rgba(230,215,195,0.8));
}
@keyframes mirror-breathe {
  0%, 100% { box-shadow: inset 0 0 30px rgba(42,119,80,0.08); }
  50% { box-shadow: inset 0 0 50px rgba(42,119,80,0.15); }
}
/* Ornamental flourish at top of frame */
#mirror-frame::before {
  content: '❦';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  color: #5a3e0a;
  z-index: 2;
}
#voiced-by {
  margin-top: 1.2rem;
  font-size: 14px;
  color: #998877;
  letter-spacing: 0.08em;
  font-style: italic;
}
#status {
  margin-top: 2rem;
  font-size: 24px;
  color: #666;
  min-height: 2rem;
  text-align: center;
  transition: color 0.5s ease;
}
#transcript {
  margin-top: 1.5rem;
  font-size: 20px;
  color: #444;
  max-width: 85%;
  text-align: center;
  line-height: 1.5;
  min-height: 3rem;
}
/* No background color changes — the mirror is the constant */
</style>
</head>
<body>

<div id="main">
  <div id="mirror-frame">
    <button id="talk-btn">Talk to<br>Nora</button>
  </div>
  <div id="voiced-by">voiced by Cori</div>
  <div id="status"></div>
  <div id="transcript"></div>
</div>

<script>
// === CONFIG ===
const BASE_URL = location.origin;
const VOICE_NAME = 'cori';
const MAX_HISTORY = 20;

// === STATE ===
let started = false;
let listening = false;
let speaking = false;
let recognition = null;
let synth = window.speechSynthesis;
let history = [];
let voicesLoaded = false;

const btn = document.getElementById('talk-btn');
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');

// === HSL — stored but not displayed (no color changes) ===
function applyHSL(hsl) {
  // HSL data captured for dark circuit but mirror stays constant
  return;
}

// === SPEECH RECOGNITION ===
function createRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    statusEl.textContent = 'Speech not supported in this browser';
    return null;
  }
  const rec = new SR();
  rec.continuous = false;
  rec.interimResults = true;
  rec.lang = 'en-US';

  rec.onstart = () => {
    listening = true;
    btn.className = 'listening'; document.getElementById('mirror-frame').className = 'listening';
    statusEl.textContent = 'Listening...';
  };

  rec.onresult = (event) => {
    let final = '';
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        final += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    transcriptEl.textContent = final || interim;
    if (final) {
      handleUserSpeech(final.trim());
    }
  };

  rec.onerror = (event) => {
    if (event.error === 'no-speech') {
      // Silence timeout -- restart listening
      if (listening) startListening();
    } else if (event.error === 'aborted') {
      // Intentional stop, do nothing
    } else {
      statusEl.textContent = '';
      listening = false;
      btn.className = ''; document.getElementById('mirror-frame').className = '';
    }
  };

  rec.onend = () => {
    if (listening && !speaking) {
      startListening();
    } else {
      btn.className = speaking ? 'speaking' : '';
    }
  };

  return rec;
}

function startListening() {
  if (!recognition) recognition = createRecognition();
  if (!recognition) return;
  listening = true;
  try {
    recognition.start();
  } catch (e) {
    // already started
  }
}

function stopListening() {
  listening = false;
  if (recognition) {
    try { recognition.stop(); } catch (e) {}
  }
}

// === COMPANION API ===
async function sendToCompanion(messages) {
  const res = await fetch(`${BASE_URL}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages })
  });
  return res.json();
}

async function fetchGreeting() {
  const res = await fetch(`${BASE_URL}/greeting`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  });
  return res.json();
}

async function handleUserSpeech(text) {
  listening = false;
  stopListening();

  btn.className = 'thinking'; document.getElementById('mirror-frame').className = 'thinking';
  statusEl.textContent = 'Nora is thinking...';
  transcriptEl.textContent = '"' + text + '"';

  history.push({ role: 'user', content: text });

  try {
    const data = await sendToCompanion(history.slice(-MAX_HISTORY));
    history.push({ role: 'assistant', content: data.response });
    applyHSL(data.hsl);
    speak(data.response);
  } catch (err) {
    statusEl.textContent = '';
    transcriptEl.textContent = 'Could not reach Nora. Is the server running?';
    btn.className = ''; document.getElementById('mirror-frame').className = '';
    // Retry listening after a pause
    setTimeout(startListening, 3000);
  }
}

// === TEXT-TO-SPEECH ===
function pickVoice() {
  const voices = synth.getVoices();
  if (!voices.length) return null;

  // Try to find a Cori-like voice: prefer natural/female voices
  const preferred = [
    v => v.name.toLowerCase().includes('cori'),
    v => v.name.toLowerCase().includes('samantha'),
    v => v.name.includes('Google UK English Female'),
    v => v.name.includes('Google US English'),
    v => v.name.toLowerCase().includes('natural') && v.lang.startsWith('en'),
    v => v.name.toLowerCase().includes('female') && v.lang.startsWith('en'),
    v => v.lang.startsWith('en'),
  ];
  for (const test of preferred) {
    const match = voices.find(test);
    if (match) return match;
  }
  return voices[0];
}

function speak(text) {
  synth.cancel();
  speaking = true;
  btn.className = 'speaking'; document.getElementById('mirror-frame').className = 'speaking';
  statusEl.textContent = '';
  transcriptEl.textContent = text;

  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.95;
  utter.pitch = 1.0;
  const voice = pickVoice();
  if (voice) utter.voice = voice;

  utter.onend = () => {
    speaking = false;
    btn.className = ''; document.getElementById('mirror-frame').className = '';
    statusEl.textContent = '';
    startListening();
  };

  utter.onerror = () => {
    speaking = false;
    btn.className = ''; document.getElementById('mirror-frame').className = '';
    statusEl.textContent = '';
    startListening();
  };

  synth.speak(utter);
}

// === BUTTON ===
btn.addEventListener('click', () => {
  if (!started) {
    started = true;
    // First tap: fetch greeting and have Nora speak first
    btn.className = 'thinking'; document.getElementById('mirror-frame').className = 'thinking';
    statusEl.textContent = 'Nora is thinking...';
    doGreeting();
    return;
  }

  // Subsequent taps toggle listening
  if (speaking) {
    synth.cancel();
    speaking = false;
    btn.className = ''; document.getElementById('mirror-frame').className = '';
    statusEl.textContent = '';
    startListening();
  } else if (listening) {
    stopListening();
    btn.className = ''; document.getElementById('mirror-frame').className = '';
    statusEl.textContent = '';
  } else {
    startListening();
  }
});

// === GREETING (Nora speaks first) ===
async function doGreeting() {
  try {
    const data = await fetchGreeting();
    if (data.response) {
      history.push({ role: 'assistant', content: data.response });
      applyHSL(data.hsl);
      speak(data.response);
    } else {
      // Fallback: send a hello through normal chat
      history.push({ role: 'user', content: 'hello' });
      const fallback = await sendToCompanion(history.slice(-MAX_HISTORY));
      history.push({ role: 'assistant', content: fallback.response });
      // Replace the synthetic "hello" so Nora doesn't think the user said hello
      history.shift();
      applyHSL(fallback.hsl);
      speak(fallback.response);
    }
  } catch (err) {
    statusEl.textContent = '';
    transcriptEl.textContent = 'Could not reach Nora. Is the server running?';
    btn.className = ''; document.getElementById('mirror-frame').className = '';
    started = false;
  }
}

// === INIT ===
// Preload voices
synth.onvoiceschanged = () => {
  voicesLoaded = true;
  synth.getVoices();
};
// Some browsers fire it immediately
if (synth.getVoices().length) voicesLoaded = true;
</script>
</body>
</html>
