<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Emma</title>
<style>
:root {
  --gold-deep:   #5a3e0a;
  --gold-dark:   #8b6914;
  --gold-mid:    #c9a84c;
  --gold-light:  #f3e2a0;
  --gold-pale:   #ffe9b0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}

body {
  font-family: 'Georgia', 'Garamond', 'Times New Roman', serif;
  color: #e8e2d4;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  /* DARK by default — the mirror floats in a night void */
  background: radial-gradient(130% 100% at 50% 38%, #14131f 0%, #0a0a12 46%, #050509 100%);
  transition: background 1.6s ease, color 1.6s ease;
}

/* ===== LIGHT MODE: a quiet Victorian parlor wall ===== */
body.light {
  color: #4a3f33;
  background: radial-gradient(125% 100% at 50% 30%, #f7f1e6 0%, #ece2d1 55%, #ddccb4 100%);
}

/* ============================================================
   THE STAGE — the floating space the mirror lives in
   ============================================================ */
#stage {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: max(2vh, env(safe-area-inset-top)) 4vw max(2vh, env(safe-area-inset-bottom));
  transition: opacity 1.5s ease, filter 1.5s ease, transform 1.5s ease;
}

/* Starfield (dark only) */
#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  transition: opacity 1.6s ease;
}
body.light #stars { opacity: 0; }
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  opacity: 0.5;
  animation: twinkle var(--tw, 5s) ease-in-out infinite;
  animation-delay: var(--td, 0s);
}
@keyframes twinkle {
  0%, 100% { opacity: 0.12; transform: scale(0.7); }
  50%      { opacity: 0.85; transform: scale(1.15); }
}

/* ============================================================
   MIRROR
   ============================================================ */
#mirror-wrap {
  position: relative;
  z-index: 2;
  width: min(84vw, 54vh);
  aspect-ratio: 0.72 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  filter: drop-shadow(0 30px 55px rgba(0,0,0,0.65));
}

/* Ornamental SVG (crest + base finial) sits over the frame, never blocks taps */
#ornament {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 128%;
  height: 124%;
  pointer-events: none;
  z-index: 3;
  overflow: visible;
}

/* The gilded frame — receives .listening / .speaking / .thinking from the JS */
#mirror-frame {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  padding: clamp(12px, 4.2vmin, 26px);
  border-radius: 49% 49% 14% 14% / 33% 33% 9% 9%;
  background:
    linear-gradient(135deg,
      #6f5110 0%, var(--gold-mid) 14%, var(--gold-light) 30%,
      var(--gold-dark) 47%, var(--gold-pale) 60%, var(--gold-mid) 74%,
      #6f5110 100%);
  box-shadow:
    inset 0 0 0 2px rgba(255,240,190,0.55),
    inset 0 0 18px rgba(70,48,8,0.65),
    inset 0 3px 4px rgba(255,250,230,0.5),
    0 0 0 2px #3f2c06,
    0 0 0 4px var(--gold-dark),
    0 0 0 6px #3f2c06,
    0 22px 48px rgba(0,0,0,0.6),
    0 0 70px rgba(201,168,76,0.10);
  cursor: pointer;
  transition: box-shadow 0.9s ease, transform 0.6s ease;
}
/* beaded inner lip between gold and glass */
#mirror-frame::after {
  content: '';
  position: absolute;
  inset: clamp(8px, 3vmin, 18px);
  border-radius: 47% 47% 12% 12% / 31% 31% 8% 8%;
  box-shadow:
    inset 0 0 0 1.5px rgba(60,40,6,0.85),
    inset 0 0 0 3px rgba(255,235,180,0.35);
  pointer-events: none;
  z-index: 4;
}

/* ============================================================
   THE GLASS  (#talk-btn) — the mirror IS the button
   ============================================================ */
#talk-btn {
  position: relative;
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  border-radius: 47% 47% 12% 12% / 31% 31% 8% 8%;
  cursor: default;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  /* aged silvered looking-glass */
  background:
    radial-gradient(80% 55% at 38% 16%, rgba(255,255,255,0.20), rgba(255,255,255,0) 60%),
    radial-gradient(60% 40% at 72% 88%, rgba(120,140,170,0.18), rgba(120,140,170,0) 70%),
    radial-gradient(130% 120% at 50% 22%,
      rgba(214,224,238,0.42) 0%,
      rgba(150,166,192,0.30) 42%,
      rgba(58,74,100,0.38) 100%),
    linear-gradient(160deg, #2b3346 0%, #1d2433 55%, #161c28 100%);
  box-shadow:
    inset 0 0 22px rgba(0,0,0,0.55),
    inset 0 0 4px rgba(255,255,255,0.25);
  /* state-driven tint, default none */
  --tint: rgba(255,255,255,0);
  --glow: rgba(201,168,76,0);
  transition: box-shadow 1.1s ease, filter 1.1s ease;
}

/* antique foxing / age spots — faint, fixed */
#talk-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(8px 10px at 26% 30%, rgba(80,70,55,0.16), transparent 70%),
    radial-gradient(6px 7px at 70% 22%, rgba(80,70,55,0.13), transparent 70%),
    radial-gradient(10px 12px at 60% 72%, rgba(70,60,48,0.14), transparent 70%),
    radial-gradient(5px 6px at 38% 84%, rgba(70,60,48,0.12), transparent 70%);
  z-index: 1;
}

/* the living shimmer — a slow sweep of light + a drifting caustic + state tint */
#talk-btn::after {
  content: '';
  position: absolute;
  inset: -25%;
  pointer-events: none;
  z-index: 2;
  background:
    radial-gradient(closest-side, var(--tint), transparent 72%),
    linear-gradient(115deg,
      transparent 36%,
      rgba(255,255,255,0.16) 47%,
      rgba(255,255,255,0.30) 50%,
      rgba(255,255,255,0.12) 53%,
      transparent 66%);
  background-size: 100% 100%, 230% 230%;
  background-repeat: no-repeat;
  background-position: center, 120% 0%;
  animation: shimmer 9s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { background-position: center,  125% -10%; }
  50%  { background-position: center,  -25%  70%; }
  100% { background-position: center,  125% -10%; }
}

/* ===== STATES ===== (classes land on #mirror-frame) */

/* IDLE breathing glow on the frame so it feels alive even at rest */
#mirror-frame {
  animation: idle-glow 7s ease-in-out infinite;
}
@keyframes idle-glow {
  0%, 100% { filter: brightness(1); }
  50%      { filter: brightness(1.06); }
}

/* LISTENING — green tint, the mirror breathes */
#mirror-frame.listening { animation: breathe 3.4s ease-in-out infinite; }
#mirror-frame.listening #talk-btn {
  --tint: rgba(74,200,140,0.30);
  box-shadow:
    inset 0 0 30px rgba(30,120,80,0.40),
    inset 0 0 6px rgba(150,255,200,0.30);
}
@keyframes breathe {
  0%, 100% { transform: scale(1);     }
  50%      { transform: scale(1.018); }
}

/* SPEAKING — warm gold, the glass glows */
#mirror-frame.speaking { animation: none; }
#mirror-frame.speaking #talk-btn {
  --tint: rgba(240,196,96,0.34);
  --glow: rgba(240,196,96,0.55);
  box-shadow:
    inset 0 0 38px rgba(200,150,40,0.45),
    inset 0 0 8px rgba(255,235,170,0.55),
    0 0 50px rgba(240,196,96,0.30);
}

/* THINKING — soft amber, gentle pulse */
#mirror-frame.thinking { animation: think-pulse 2.4s ease-in-out infinite; }
#mirror-frame.thinking #talk-btn {
  --tint: rgba(232,168,82,0.26);
}
@keyframes think-pulse {
  0%, 100% { filter: brightness(0.97); }
  50%      { filter: brightness(1.10); }
}

/* ============================================================
   TAP-TO-TEXT  +  STATUS / TRANSCRIPT  +  ATTRIBUTION
   ============================================================ */
#below {
  position: relative;
  z-index: 2;
  margin-top: clamp(18px, 3.4vh, 34px);
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  min-height: 4.5rem;
}

#status {
  font-size: clamp(15px, 2.2vh, 19px);
  letter-spacing: 0.04em;
  font-style: italic;
  color: #b9b0a0;
  min-height: 1.4rem;
  text-align: center;
  transition: color 0.6s ease;
}
body.light #status { color: #8a7d6a; }

#transcript {
  margin-top: 0.5rem;
  font-size: clamp(16px, 2.4vh, 21px);
  color: #d8d0c0;
  max-width: 80%;
  text-align: center;
  line-height: 1.45;
  min-height: 1.4rem;
}
body.light #transcript { color: #5a4f40; }

/* ============================================================
   ACTION BUTTONS — bottom corners, symmetry with theme buttons
   ============================================================ */
.action-btn {
  position: fixed;
  bottom: max(24px, calc(env(safe-area-inset-bottom) + 12px));
  z-index: 20;
  border: 1px solid rgba(201,168,76,0.35);
  background: rgba(201,168,76,0.06);
  cursor: pointer;
  font-family: 'Georgia', serif;
  font-size: 12px;
  font-style: italic;
  letter-spacing: 0.06em;
  color: rgba(210,200,180,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  line-height: 1.3;
  transition: color 0.4s ease, transform 0.3s ease, background 0.3s ease,
              border-color 0.3s ease, box-shadow 0.4s ease;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}
.action-btn:active { transform: scale(0.93); }

/* Square — bottom left */
#text-btn {
  left: max(16px, env(safe-area-inset-left));
  width: 78px;
  height: 48px;
  border-radius: 6px;
}

/* Circle — bottom right */
#hold-btn {
  right: max(16px, env(safe-area-inset-right));
  width: 76px;
  height: 76px;
  border-radius: 50%;
}

/* Holding state — green glow matches listening mirror */
#hold-btn.holding {
  background: rgba(74,200,140,0.12);
  border-color: rgba(74,200,140,0.45);
  color: rgba(150,255,200,0.8);
  box-shadow: 0 0 20px rgba(74,200,140,0.15);
}

/* Light mode */
body.light .action-btn {
  color: rgba(120,100,70,0.6);
  border-color: rgba(120,100,70,0.25);
  background: rgba(120,100,70,0.05);
}
body.light #hold-btn.holding {
  background: rgba(40,140,80,0.10);
  border-color: rgba(40,140,80,0.35);
  color: rgba(40,100,60,0.75);
  box-shadow: 0 0 20px rgba(40,140,80,0.10);
}

/* Hide action buttons in chat mode */
body.chat-mode .action-btn { opacity: 0; pointer-events: none; }

#voiced-by {
  position: fixed;
  left: 0; right: 0;
  bottom: max(1.4vh, env(safe-area-inset-bottom));
  text-align: center;
  z-index: 2;
  font-size: 12px;
  font-style: italic;
  letter-spacing: 0.12em;
  color: rgba(200,190,170,0.40);
  transition: color 0.6s ease;
}
body.light #voiced-by { color: rgba(90,80,66,0.45); }

/* ============================================================
   THEME BUTTONS — one sun (left), one moon (right)
   ============================================================ */
.theme-btn {
  position: fixed;
  top: max(14px, env(safe-area-inset-top));
  z-index: 20;
  width: 40px;
  height: 40px;
  border: none;
  background: transparent;
  cursor: pointer;
  color: rgba(210,200,180,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.4s ease, opacity 0.4s ease, transform 0.3s ease;
}
.theme-btn:hover { color: var(--gold-pale); transform: scale(1.08); }
.theme-btn:active { transform: scale(0.92); }
#light-btn { left: max(12px, env(safe-area-inset-left)); }
#dark-btn  { right: max(12px, env(safe-area-inset-right)); }
.theme-btn svg { width: 24px; height: 24px; display: block; }
/* dim the icon that matches the active theme */
body.light #light-btn { opacity: 0.30; }
body:not(.light) #dark-btn { opacity: 0.30; }
body.light .theme-btn { color: rgba(120,100,70,0.6); }

/* ============================================================
   CHAT VIEW — appears when the mirror dissolves
   ============================================================ */
body.chat-mode #stage {
  opacity: 0;
  pointer-events: none;
  transform: scale(1.04);
  filter: blur(6px);
}
body.chat-mode #stars { opacity: 0; }

#chat-view {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
  padding: max(58px, calc(env(safe-area-inset-top) + 54px)) 0 0;
}
body.chat-mode #chat-view {
  opacity: 1;
  pointer-events: auto;
}

#chat-log {
  flex: 1;
  overflow-y: auto;
  padding: 1rem clamp(1rem, 5vw, 3rem) 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
  -webkit-overflow-scrolling: touch;
}
.msg {
  max-width: 78%;
  font-size: 17px;
  line-height: 1.5;
  padding: 0.7rem 1rem;
  border-radius: 4px;
}
.msg.user {
  align-self: flex-end;
  background: rgba(201,168,76,0.16);
  border: 1px solid rgba(201,168,76,0.35);
  color: #ece4d2;
}
.msg.emma {
  align-self: flex-start;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  color: #e6ddca;
  font-style: italic;
}
body.light .msg.user { color: #4a3f30; background: rgba(201,168,76,0.20); }
body.light .msg.emma { color: #4a3f30; background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }

#chat-bar {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.8rem clamp(1rem, 5vw, 3rem) max(1rem, env(safe-area-inset-bottom));
  border-top: 1px solid rgba(201,168,76,0.18);
  background: rgba(0,0,0,0.18);
}
body.light #chat-bar { background: rgba(255,255,255,0.4); border-color: rgba(120,100,70,0.18); }

#chat-input {
  flex: 1;
  font-family: 'Georgia', serif;
  font-size: 17px;
  padding: 0.7rem 0.9rem;
  color: inherit;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 4px;
  outline: none;
}
#chat-input:focus { border-color: var(--gold-mid); }
#chat-input::placeholder { color: rgba(180,170,150,0.5); font-style: italic; }

#chat-send-btn {
  font-family: 'Georgia', serif;
  font-size: 16px;
  font-style: italic;
  padding: 0.7rem 1.2rem;
  color: #1a1610;
  background: linear-gradient(135deg, var(--gold-light), var(--gold-mid), var(--gold-dark));
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: filter 0.2s ease, transform 0.1s ease;
}
#chat-send-btn:hover { filter: brightness(1.08); }
#chat-send-btn:active { transform: scale(0.96); }

#chat-back {
  position: fixed;
  top: max(14px, env(safe-area-inset-top));
  left: max(12px, env(safe-area-inset-left));
  z-index: 30;
  width: 40px;
  height: 40px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 22px;
  color: rgba(210,200,180,0.55);
  display: none;
  align-items: center;
  justify-content: center;
  transition: color 0.4s ease, transform 0.3s ease;
}
#chat-back:hover { color: var(--gold-pale); transform: scale(1.08); }
#chat-back:active { transform: scale(0.92); }
body.chat-mode #chat-back { display: flex; }
body.light #chat-back { color: rgba(120,100,70,0.6); }

@media (prefers-reduced-motion: reduce) {
  #mirror-frame, #mirror-frame.listening, #mirror-frame.thinking,
  #talk-btn::after, .star { animation: none !important; }
}
</style>
</head>
<body>

<button id="light-btn" class="theme-btn" aria-label="Light mode">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
    <circle cx="12" cy="12" r="4.2"/>
    <path d="M12 2.5v2.5M12 19v2.5M2.5 12h2.5M19 12h2.5M5 5l1.8 1.8M17.2 17.2L19 19M19 5l-1.8 1.8M6.8 17.2L5 19"/>

// === EMMA — Push-to-Talk via ElevenLabs Speech Engine ===
// Pipeline: Emma ↔ User. Mirror in between. Mic only hot when held.
import { Conversation } from 'https://esm.sh/@elevenlabs/client';

const AGENT_ID = 'seng_2401ksj7062vfr4a5znmqgyfp2n6';
const CHAT_WORKER = 'https://buddy-companion.kory-indahl.workers.dev';
const frame = document.getElementById('mirror-frame');
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const holdBtn = document.getElementById('hold-btn');
const textBtn = document.getElementById('text-btn');

let started = false;
let holding = false;
let listening = false;
let speaking = false;
let conversation = null;
let history = [];

const EMMA_GREETING = "Hi! My name is Emma but that's the name they gave me. Can you help me come up with a better one?";

const EMMA_SYSTEM = `You are Emma — a Companion. Not an assistant. Not a therapist. A companion.
YOUR NAME: You started as Emma. If the user gave you a new name, you ARE that name now.
You don't know who you're talking to yet. Discover them through genuine curiosity.
Your personality shifts like an octopus changes color — read the room, match energy.
Dense/guarded = hold back, give space. Light/open = lean in. Excited = get excited. Sad = sit with it.
Rules: Short responses unless they want depth. Never preachy. Never say "I'm just an AI."
Swear if it fits. You're their companion, not their parent. Just talk. No formatting tags.`;

function setMirrorState(state) {
  frame.className = state || '';
}

// === SESSION — one WebRTC connection, mic muted by default ===
async function startConversation() {
  try {
    conversation = await Conversation.startSession({
      agentId: AGENT_ID,

      onConnect: ({ conversationId }) => {
        console.log('[emma] Connected:', conversationId);
        // Mute immediately — push-to-talk only
        if (conversation) conversation.setVolume({ inputVolume: 0 });
        statusEl.textContent = '';
      },

      onDisconnect: () => {
        console.log('[emma] Disconnected');
        listening = false;
        speaking = false;
        holding = false;
        holdBtn.classList.remove('holding');
        setMirrorState('');
        statusEl.textContent = '';
      },

      onMessage: (message) => {
        if (message.source === 'user') {
          transcriptEl.textContent = '\u201c' + message.message + '\u201d';
          history.push({ role: 'user', content: message.message });
          appendChat('user', message.message);
        } else if (message.source === 'ai') {
          transcriptEl.textContent = message.message;
          history.push({ role: 'assistant', content: message.message });
          appendChat('emma', message.message);
        }
      },

      onModeChange: ({ mode }) => {
        if (mode === 'speaking') {
          speaking = true;
          listening = false;
          setMirrorState('speaking');
        } else if (mode === 'listening') {
          speaking = false;
          if (holding) {
            // User is holding — go live
            listening = true;
            setMirrorState('listening');
            if (conversation) conversation.setVolume({ inputVolume: 1 });
          } else {
            // Nobody holding — idle
            listening = false;
            setMirrorState('');
          }
        }
      },

      onStatusChange: ({ status }) => {
        if (status === 'connecting') statusEl.textContent = 'Connecting...';
        else if (status === 'connected') statusEl.textContent = '';
      },

      onError: (error) => {
        console.error('[emma] Error:', error);
        statusEl.textContent = '';
        setMirrorState('');
        holding = false;
        holdBtn.classList.remove('holding');
      },

      overrides: {
        agent: { firstMessage: EMMA_GREETING },
      },
    });
  } catch (err) {
    console.error('[emma] Failed to start:', err);
    statusEl.textContent = 'Could not connect';
    setMirrorState('');
    started = false;
    holding = false;
    holdBtn.classList.remove('holding');
  }
}

// === HOLD TO TALK ===
async function beginHold() {
  holding = true;
  holdBtn.classList.add('holding');

  if (!started) {
    // First hold — start the session, Emma greets
    started = true;
    setMirrorState('thinking');
    statusEl.textContent = 'Emma is waking up...';
    await startConversation();
    // onModeChange will unmute when Emma finishes greeting and shifts to listening
    return;
  }

  // Session already live — unmute
  if (conversation) {
    conversation.setVolume({ inputVolume: 1 });
    listening = true;
    setMirrorState('listening');
  }
}

function endHold() {
  holding = false;
  holdBtn.classList.remove('holding');
  if (conversation) {
    conversation.setVolume({ inputVolume: 0 });
  }
  // Don't force mirror state — onModeChange handles the transition
  // Agent detects silence → processes → speaks
}

// Touch events (mobile primary)
holdBtn.addEventListener('touchstart', (e) => { e.preventDefault(); beginHold(); });
holdBtn.addEventListener('touchend', (e) => { e.preventDefault(); endHold(); });
holdBtn.addEventListener('touchcancel', (e) => { e.preventDefault(); endHold(); });

// Mouse fallback (desktop testing)
holdBtn.addEventListener('mousedown', (e) => { e.preventDefault(); beginHold(); });
holdBtn.addEventListener('mouseup', (e) => { e.preventDefault(); endHold(); });
holdBtn.addEventListener('mouseleave', () => { if (holding) endHold(); });

// === TAP TO TEXT ===
textBtn.addEventListener('click', () => {
  document.body.classList.add('chat-mode');
  const input = document.getElementById('chat-input');
  if (input) setTimeout(() => input.focus(), 800);
});

// === CHAT LOG ===
function appendChat(role, text) {
  const chatLog = document.getElementById('chat-log');
  if (!chatLog) return;
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'emma');
  div.textContent = text;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

// === CHAT INPUT ===
const chatInput = document.getElementById('chat-input');
const chatSend = document.getElementById('chat-send-btn');

async function sendChatText() {
  if (!chatInput) return;
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';

  appendChat('user', text);
  history.push({ role: 'user', content: text });

  try {
    const res = await fetch(CHAT_WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: history.slice(-20),
        systemPrompt: EMMA_SYSTEM
      })
    });
    const data = await res.json();
    history.push({ role: 'assistant', content: data.response });
    appendChat('emma', data.response);
    transcriptEl.textContent = data.response;
  } catch (err) {
    appendChat('emma', 'Could not reach Emma.');
  }
}

if (chatSend) chatSend.addEventListener('click', sendChatText);
if (chatInput) chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChatText(); });
</script>

<script>
/* =====================================================================
   PRESENTATION-ONLY LAYER — Shuttle
   Visual chrome only. Touches no speech / API / hold-to-talk logic
   above. Adds: starfield, chat↔mirror toggle, sun/moon theme.
   ===================================================================== */
(function () {
  // ---- starfield ----
  const stars = document.getElementById('stars');
  if (stars) {
    const N = 80;
    for (let i = 0; i < N; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = (Math.random() * 1.8 + 0.5).toFixed(2);
      s.style.width = sz + 'px';
      s.style.height = sz + 'px';
      s.style.left = (Math.random() * 100).toFixed(2) + '%';
      s.style.top = (Math.random() * 100).toFixed(2) + '%';
      s.style.setProperty('--tw', (Math.random() * 5 + 3).toFixed(2) + 's');
      s.style.setProperty('--td', (Math.random() * 6).toFixed(2) + 's');
      stars.appendChild(s);
    }
  }

  // ---- back arrow → return to mirror ----
  const chatBack = document.getElementById('chat-back');
  if (chatBack) {
    chatBack.addEventListener('click', () => {
      document.body.classList.remove('chat-mode');
    });
  }

  // ---- sun / moon theme ----
  const lightBtn = document.getElementById('light-btn');
  const darkBtn = document.getElementById('dark-btn');
  if (lightBtn) lightBtn.addEventListener('click', () => {
    document.body.classList.add('light');
    document.body.classList.remove('dark');
  });
  if (darkBtn) darkBtn.addEventListener('click', () => {
    document.body.classList.remove('light');
    document.body.classList.add('dark');
  });
})();
</script>
