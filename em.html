<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Emma</title>
<style>
:root {
  --gold-deep:   #5a3e0a;
  --gold-dark:   #8b6914;
  --gold-mid:    #c9a84c;
  --gold-light:  #f3e2a0;
  --gold-pale:   #ffe9b0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}

body {
  font-family: 'Georgia', 'Garamond', 'Times New Roman', serif;
  color: #e8e2d4;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  background: radial-gradient(130% 100% at 50% 38%, #14131f 0%, #0a0a12 46%, #050509 100%);
  transition: background 1.6s ease, color 1.6s ease;
}

body.light {
  color: #4a3f33;
  background: radial-gradient(125% 100% at 50% 30%, #f7f1e6 0%, #ece2d1 55%, #ddccb4 100%);
}

#stage {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: max(2vh, env(safe-area-inset-top)) 4vw max(2vh, env(safe-area-inset-bottom));
  transition: opacity 1.5s ease, filter 1.5s ease, transform 1.5s ease;
}

#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  transition: opacity 1.6s ease;
}
body.light #stars { opacity: 0; }
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  opacity: 0.5;
  animation: twinkle var(--tw, 5s) ease-in-out infinite;
  animation-delay: var(--td, 0s);
}
@keyframes twinkle {
  0%, 100% { opacity: 0.12; transform: scale(0.7); }
  50%      { opacity: 0.85; transform: scale(1.15); }
}

#mirror-wrap {
  position: relative;
  z-index: 2;
  width: min(84vw, 54vh);
  aspect-ratio: 0.72 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  filter: drop-shadow(0 30px 55px rgba(0,0,0,0.65));
}

#ornament {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 128%;
  height: 124%;
  pointer-events: none;
  z-index: 3;
  overflow: visible;
}

#mirror-frame {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  padding: clamp(12px, 4.2vmin, 26px);
  border-radius: 49% 49% 14% 14% / 33% 33% 9% 9%;
  background:
    linear-gradient(135deg,
      #6f5110 0%, var(--gold-mid) 14%, var(--gold-light) 30%,
      var(--gold-dark) 47%, var(--gold-pale) 60%, var(--gold-mid) 74%,
      #6f5110 100%);
  box-shadow:
    inset 0 0 0 2px rgba(255,240,190,0.55),
    inset 0 0 18px rgba(70,48,8,0.65),
    inset 0 3px 4px rgba(255,250,230,0.5),
    0 0 0 2px #3f2c06,
    0 0 0 4px var(--gold-dark),
    0 0 0 6px #3f2c06,
    0 22px 48px rgba(0,0,0,0.6),
    0 0 70px rgba(201,168,76,0.10);
  cursor: pointer;
  touch-action: manipulation;
  transition: box-shadow 0.9s ease, transform 0.6s ease;
}
#mirror-frame::after {
  content: '';
  position: absolute;
  inset: clamp(8px, 3vmin, 18px);
  border-radius: 47% 47% 12% 12% / 31% 31% 8% 8%;
  box-shadow:
    inset 0 0 0 1.5px rgba(60,40,6,0.85),
    inset 0 0 0 3px rgba(255,235,180,0.35);
  pointer-events: none;
  z-index: 4;
}

#talk-btn {
  position: relative;
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  border-radius: 47% 47% 12% 12% / 31% 31% 8% 8%;
  cursor: pointer;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  background:
    radial-gradient(80% 55% at 38% 16%, rgba(255,255,255,0.20), rgba(255,255,255,0) 60%),
    radial-gradient(60% 40% at 72% 88%, rgba(120,140,170,0.18), rgba(120,140,170,0) 70%),
    radial-gradient(130% 120% at 50% 22%,
      rgba(214,224,238,0.42) 0%,
      rgba(150,166,192,0.30) 42%,
      rgba(58,74,100,0.38) 100%),
    linear-gradient(160deg, #2b3346 0%, #1d2433 55%, #161c28 100%);
  box-shadow:
    inset 0 0 22px rgba(0,0,0,0.55),
    inset 0 0 4px rgba(255,255,255,0.25);
  --tint: rgba(255,255,255,0);
  --glow: rgba(201,168,76,0);
  transition: box-shadow 1.1s ease, filter 1.1s ease;
}

#talk-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(8px 10px at 26% 30%, rgba(80,70,55,0.16), transparent 70%),
    radial-gradient(6px 7px at 70% 22%, rgba(80,70,55,0.13), transparent 70%),
    radial-gradient(10px 12px at 60% 72%, rgba(70,60,48,0.14), transparent 70%),
    radial-gradient(5px 6px at 38% 84%, rgba(70,60,48,0.12), transparent 70%);
  z-index: 1;
}

#talk-btn::after {
  content: '';
  position: absolute;
  inset: -25%;
  pointer-events: none;
  z-index: 2;
  background:
    radial-gradient(closest-side, var(--tint), transparent 72%),
    linear-gradient(115deg,
      transparent 36%,
      rgba(255,255,255,0.16) 47%,
      rgba(255,255,255,0.30) 50%,
      rgba(255,255,255,0.12) 53%,
      transparent 66%);
  background-size: 100% 100%, 230% 230%;
  background-repeat: no-repeat;
  background-position: center, 120% 0%;
  animation: shimmer 9s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { background-position: center,  125% -10%; }
  50%  { background-position: center,  -25%  70%; }
  100% { background-position: center,  125% -10%; }
}

#mirror-frame {
  animation: idle-glow 7s ease-in-out infinite;
}
@keyframes idle-glow {
  0%, 100% { filter: brightness(1); }
  50%      { filter: brightness(1.06); }
}

#mirror-frame.listening { animation: breathe 3.4s ease-in-out infinite; }
#mirror-frame.listening #talk-btn {
  --tint: rgba(74,200,140,0.30);
  box-shadow:
    inset 0 0 30px rgba(30,120,80,0.40),
    inset 0 0 6px rgba(150,255,200,0.30);
}
@keyframes breathe {
  0%, 100% { transform: scale(1);     }
  50%      { transform: scale(1.018); }
}

#mirror-frame.speaking { animation: none; }
#mirror-frame.speaking #talk-btn {
  --tint: rgba(240,196,96,0.34);
  --glow: rgba(240,196,96,0.55);
  box-shadow:
    inset 0 0 38px rgba(200,150,40,0.45),
    inset 0 0 8px rgba(255,235,170,0.55),
    0 0 50px rgba(240,196,96,0.30);
}

#mirror-frame.thinking { animation: think-pulse 2.4s ease-in-out infinite; }
#mirror-frame.thinking #talk-btn {
  --tint: rgba(232,168,82,0.26);
}
@keyframes think-pulse {
  0%, 100% { filter: brightness(0.97); }
  50%      { filter: brightness(1.10); }
}

#below {
  position: relative;
  z-index: 2;
  margin-top: clamp(18px, 3.4vh, 34px);
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  min-height: 4.5rem;
}

#status {
  font-size: clamp(15px, 2.2vh, 19px);
  letter-spacing: 0.04em;
  font-style: italic;
  color: #b9b0a0;
  min-height: 1.4rem;
  text-align: center;
  transition: color 0.6s ease;
}
body.light #status { color: #8a7d6a; }

#transcript {
  margin-top: 0.5rem;
  font-size: clamp(16px, 2.4vh, 21px);
  color: #d8d0c0;
  max-width: 80%;
  text-align: center;
  line-height: 1.45;
  min-height: 1.4rem;
}
body.light #transcript { color: #5a4f40; }

#text-toggle {
  margin-top: clamp(14px, 2.4vh, 26px);
  font-size: 15px;
  font-style: italic;
  letter-spacing: 0.14em;
  color: #c9a84c;
  cursor: pointer;
  padding: 8px 14px;
  opacity: 0;
  transform: translateY(14px);
  pointer-events: none;
  transition: opacity 2s ease, transform 2s ease, color 0.4s ease;
}
#text-toggle.revealed {
  opacity: 0.6;
  transform: translateY(0);
  pointer-events: auto;
}
#text-toggle.revealed:hover { color: var(--gold-pale); opacity: 0.95; }
#text-toggle::before { content: '— '; opacity: 0.6; }
#text-toggle::after  { content: ' —'; opacity: 0.6; }

.theme-btn {
  position: fixed;
  top: max(14px, env(safe-area-inset-top));
  z-index: 20;
  width: 40px;
  height: 40px;
  border: none;
  background: transparent;
  cursor: pointer;
  color: rgba(210,200,180,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.4s ease, opacity 0.4s ease, transform 0.3s ease;
}
.theme-btn:hover { color: var(--gold-pale); transform: scale(1.08); }
.theme-btn:active { transform: scale(0.92); }
#light-btn { left: max(12px, env(safe-area-inset-left)); }
#dark-btn  { right: max(12px, env(safe-area-inset-right)); }
.theme-btn svg { width: 24px; height: 24px; display: block; }
body.light #light-btn { opacity: 0.30; }
body:not(.light) #dark-btn { opacity: 0.30; }
body.light .theme-btn { color: rgba(120,100,70,0.6); }

body.chat-mode #stage {
  opacity: 0;
  pointer-events: none;
  transform: scale(1.04);
  filter: blur(6px);
}
body.chat-mode #stars { opacity: 0; }

#chat-view {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
  padding: max(58px, calc(env(safe-area-inset-top) + 54px)) 0 0;
}
body.chat-mode #chat-view {
  opacity: 1;
  pointer-events: auto;
}

#chat-log {
  flex: 1;
  overflow-y: auto;
  padding: 1rem clamp(1rem, 5vw, 3rem) 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
  -webkit-overflow-scrolling: touch;
}
.msg {
  max-width: 78%;
  font-size: 17px;
  line-height: 1.5;
  padding: 0.7rem 1rem;
  border-radius: 4px;
}
.msg.user {
  align-self: flex-end;
  background: rgba(201,168,76,0.16);
  border: 1px solid rgba(201,168,76,0.35);
  color: #ece4d2;
}
.msg.emma {
  align-self: flex-start;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  color: #e6ddca;
  font-style: italic;
}
body.light .msg.user { color: #4a3f30; background: rgba(201,168,76,0.20); }
body.light .msg.emma { color: #4a3f30; background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }

#chat-bar {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.8rem clamp(1rem, 5vw, 3rem) max(1rem, env(safe-area-inset-bottom));
  border-top: 1px solid rgba(201,168,76,0.18);
  background: rgba(0,0,0,0.18);
}
body.light #chat-bar { background: rgba(255,255,255,0.4); border-color: rgba(120,100,70,0.18); }

#chat-input {
  flex: 1;
  font-family: 'Georgia', serif;
  font-size: 17px;
  padding: 0.7rem 0.9rem;
  color: inherit;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 4px;
  outline: none;
}
#chat-input:focus { border-color: var(--gold-mid); }
#chat-input::placeholder { color: rgba(180,170,150,0.5); font-style: italic; }

#chat-send-btn {
  font-family: 'Georgia', serif;
  font-size: 16px;
  font-style: italic;
  padding: 0.7rem 1.2rem;
  color: #1a1610;
  background: linear-gradient(135deg, var(--gold-light), var(--gold-mid), var(--gold-dark));
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: filter 0.2s ease, transform 0.1s ease;
}
#chat-send-btn:hover { filter: brightness(1.08); }
#chat-send-btn:active { transform: scale(0.96); }

/* ── Payment Wall ── */
#paywall {
  display: none;
  position: fixed;
  inset: 0;
  background: #050509;
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  padding: 2rem 1.5rem;
  text-align: center;
}
#paywall.visible { display: flex; }
#paywall-title {
  font-size: 22px;
  color: #c9a84c;
  letter-spacing: 0.06em;
}
#paywall-sub {
  font-size: 15px;
  color: rgba(180,160,120,0.6);
  line-height: 1.7;
  max-width: 320px;
  font-family: -apple-system, sans-serif;
  font-weight: 300;
}
#paywall-btn {
  width: 100%;
  max-width: 320px;
  font-size: 17px;
  padding: 0.75rem;
  border-radius: 4px;
  border: 1px solid rgba(201,168,76,0.4);
  background: rgba(201,168,76,0.1);
  color: #d4c4a0;
  cursor: pointer;
  font-family: 'Georgia', serif;
  letter-spacing: 0.06em;
  touch-action: manipulation;
}
#paywall-btn:active { opacity: 0.6; }
#paywall-btn:disabled { opacity: 0.4; cursor: default; }
#login-btn, #signup-btn {
  width: 100%; max-width: 320px; padding: 0.85rem;
  background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4);
  border-radius: 4px; color: #c9a84c; font-size: 16px; font-family: 'Georgia', serif;
  letter-spacing: 0.04em; cursor: pointer; touch-action: manipulation;
}
#login-btn:active, #signup-btn:active { opacity: 0.6; }
#login-btn:disabled, #signup-btn:disabled { opacity: 0.4; cursor: default; }
#login-email, #login-password, #signup-email, #signup-password {
  width: 100%; max-width: 320px; font-size: 16px; padding: 0.65rem 0.9rem;
  border: 1px solid rgba(201,168,76,0.3); border-radius: 4px;
  background: rgba(255,248,220,0.04); color: #d4c4a0;
  font-family: 'Georgia', serif; outline: none; text-align: center;
  -webkit-user-select: text; user-select: text;
}
#login-email:focus, #login-password:focus, #signup-email:focus, #signup-password:focus {
  border-color: rgba(201,168,76,0.55);
}
.pw-err { font-size: 13px; color: rgba(255,130,100,0.7); min-height: 18px; max-width: 320px; }
.pw-toggle { font-size: 12px; color: rgba(180,160,120,0.35); margin-top: 4px; }
.pw-link { color: rgba(201,168,76,0.55); cursor: pointer; }
.pw-link:hover { color: #c9a84c; }
#paywall-note {
  font-size: 12px;
  color: rgba(180,160,120,0.3);
  font-family: -apple-system, sans-serif;
  letter-spacing: 0.04em;
}

@media (prefers-reduced-motion: reduce) {
  #mirror-frame, #mirror-frame.listening, #mirror-frame.thinking,
  #talk-btn::after, .star { animation: none !important; }
}
</style>
</head>
<body>

<!-- Payment wall — shown after 24-hour trial -->
<div id="paywall">
  <!-- State: expired trial -->
  <div id="pw-wall">
    <div id="paywall-title">Emma</div>
    <div id="paywall-sub">Your 24 hours have come to an end.<br>If it mattered, $4.99 / month keeps her here.</div>
    <button id="paywall-btn">Continue — $4.99 / month</button>
    <div id="paywall-note">Secure checkout via Stripe. Cancel anytime.</div>
    <div class="pw-toggle">Already here? <span class="pw-link" id="show-login">Sign in</span></div>
  </div>
  <!-- State: login -->
  <div id="pw-login" style="display:none">
    <div id="paywall-title">Welcome back.</div>
    <input id="login-email" type="email" placeholder="email" autocomplete="email" />
    <input id="login-password" type="password" placeholder="password" autocomplete="current-password" />
    <button id="login-btn">Sign in</button>
    <div class="pw-err" id="login-err"></div>
    <div class="pw-toggle"><span class="pw-link" id="show-wall">← Back</span></div>
  </div>
  <!-- State: post-payment signup -->
  <div id="pw-signup" style="display:none">
    <div id="paywall-title">You're in.</div>
    <div id="paywall-sub">Create your account so Emma remembers you.</div>
    <input id="signup-email" type="email" placeholder="email" autocomplete="email" />
    <input id="signup-password" type="password" placeholder="choose a password" autocomplete="new-password" />
    <button id="signup-btn">Create account</button>
    <div class="pw-err" id="signup-err"></div>
    <div class="pw-toggle"><span class="pw-link" id="signup-skip">Skip for now</span></div>
  </div>
</div>

<!-- theme buttons -->
<button id="light-btn" class="theme-btn" aria-label="Light mode">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
    <circle cx="12" cy="12" r="4.2"/>
    <path d="M12 2.5v2.5M12 19v2.5M2.5 12h2.5M19 12h2.5M5 5l1.8 1.8M17.2 17.2L19 19M19 5l-1.8 1.8M6.8 17.2L5 19"/>
  </svg>
</button>
<button id="dark-btn" class="theme-btn" aria-label="Dark mode">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 14.5A8 8 0 1 1 9.5 4a6.4 6.4 0 0 0 10.5 10.5z"/>
  </svg>
</button>

<div id="stars"></div>

<div id="stage">
  <div id="mirror-wrap">
    <div id="mirror-frame">
      <button id="talk-btn"></button>
    </div>

    <svg id="ornament" viewBox="0 0 200 280" aria-hidden="true">
      <defs>
        <linearGradient id="og" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0"   stop-color="#6f5110"/>
          <stop offset="0.25" stop-color="#e8cf86"/>
          <stop offset="0.5" stop-color="#8b6914"/>
          <stop offset="0.72" stop-color="#ffe9b0"/>
          <stop offset="1"   stop-color="#6f5110"/>
        </linearGradient>
      </defs>
      <g fill="url(#og)" stroke="#3f2c06" stroke-width="0.8">
        <path d="M100 6
                 C 95 14, 92 20, 100 26
                 C 108 20, 105 14, 100 6 Z"/>
        <path d="M100 12
                 C 90 16, 84 24, 88 33
                 C 80 28, 72 30, 70 39
                 C 66 31, 56 33, 58 42
                 C 70 40, 80 44, 86 38
                 C 90 46, 100 44, 100 34
                 C 100 44, 110 46, 114 38
                 C 120 44, 130 40, 142 42
                 C 144 33, 134 31, 130 39
                 C 128 30, 120 28, 112 33
                 C 116 24, 110 16, 100 12 Z"/>
        <circle cx="58" cy="42" r="3.2"/>
        <circle cx="142" cy="42" r="3.2"/>
        <path d="M100 256
                 C 92 256, 86 262, 90 268
                 C 84 264, 78 268, 82 274
                 C 92 272, 96 268, 100 262
                 C 104 268, 108 272, 118 274
                 C 122 268, 116 264, 110 268
                 C 114 262, 108 256, 100 256 Z"/>
        <circle cx="100" cy="259" r="2.6"/>
      </g>
    </svg>
  </div>

  <div id="below">
    <div id="status"></div>
    <div id="transcript"></div>
    <div id="text-toggle">tap to text</div>
  </div>
</div>

<div id="chat-view">
  <div id="chat-log"></div>
  <div id="chat-bar">
    <input id="chat-input" type="text" autocomplete="off" placeholder="Say something to Emma…">
    <button id="chat-send-btn">Send</button>
  </div>
</div>

<script>
// === CONFIG ===
const BASE_URL = location.origin;
const MAX_HISTORY = 20;
const TRIAL_MS = 24 * 60 * 60 * 1000;

// === STATE ===
let started = false;
let listening = false;
let speaking = false;
let recognition = null;
let history = [];
let currentAudio = null;

const btn = document.getElementById('talk-btn');
const frame = document.getElementById('mirror-frame');
const statusEl = document.getElementById('transcript');
const transcriptEl = document.getElementById('transcript');
const paywall = document.getElementById('paywall');
const paywallBtn = document.getElementById('paywall-btn');

// === TRIAL / SUBSCRIPTION / AUTH ===
let jwtActive = false;
let storedStripeEmail = '', storedStripeCustomerId = '', storedStripeSubId = '';

function getJwt() { return localStorage.getItem('emma_jwt') || ''; }
function setJwt(jwt) { localStorage.setItem('emma_jwt', jwt); }
function clearJwt() { localStorage.removeItem('emma_jwt'); }

function isTrialExpired() {
  const start = localStorage.getItem('emma_start');
  if (!start) return false;
  return Date.now() - parseInt(start, 10) > TRIAL_MS;
}
function isSubscribed() {
  return localStorage.getItem('emma_sub') === 'active';
}
function canProceed() {
  return jwtActive || !isTrialExpired() || isSubscribed();
}
function showPaywall() {
  showPwState('wall');
  paywall.classList.add('visible');
}
function showPwState(state) {
  document.getElementById('pw-wall').style.display = state === 'wall' ? '' : 'none';
  document.getElementById('pw-login').style.display = state === 'login' ? '' : 'none';
  document.getElementById('pw-signup').style.display = state === 'signup' ? '' : 'none';
}

// === SPEECH RECOGNITION ===
function createRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.continuous = false;
  rec.interimResults = true;
  rec.lang = 'en-US';

  rec.onstart = () => {
    listening = true;
    btn.className = 'listening'; frame.className = 'listening';
  };

  rec.onresult = (event) => {
    let final = '';
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) final += event.results[i][0].transcript;
      else interim += event.results[i][0].transcript;
    }
    transcriptEl.textContent = final || interim;
    if (final) handleUserSpeech(final.trim());
  };

  rec.onerror = (event) => {
    if (event.error === 'no-speech') {
      if (listening) startListening();
    } else if (event.error === 'aborted') {
      // intentional
    } else {
      listening = false;
      btn.className = ''; frame.className = '';
    }
  };

  rec.onend = () => {
    if (listening && !speaking) startListening();
    else btn.className = speaking ? 'speaking' : '';
  };

  return rec;
}

function startListening() {
  if (!recognition) recognition = createRecognition();
  if (!recognition) return;
  listening = true;
  try { recognition.start(); } catch (e) {}
}

function stopListening() {
  listening = false;
  if (recognition) try { recognition.stop(); } catch (e) {}
}

// === COMPANION API ===
async function sendToCompanion(messages) {
  const headers = { 'Content-Type': 'application/json' };
  const jwt = getJwt();
  if (jwt) headers['Authorization'] = `Bearer ${jwt}`;
  const res = await fetch(`${BASE_URL}/chat`, { method: 'POST', headers, body: JSON.stringify({ messages }) });
  return res.json();
}

async function fetchGreeting() {
  const res = await fetch(`${BASE_URL}/greeting`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  });
  return res.json();
}

async function handleUserSpeech(text) {
  listening = false;
  stopListening();
  btn.className = 'thinking'; frame.className = 'thinking';
  transcriptEl.textContent = '"' + text + '"';
  history.push({ role: 'user', content: text });
  try {
    const data = await sendToCompanion(history.slice(-MAX_HISTORY));
    history.push({ role: 'assistant', content: data.response });
    speak(data.response);
  } catch (err) {
    transcriptEl.textContent = 'Could not reach Emma. Is the server running?';
    btn.className = ''; frame.className = '';
    setTimeout(startListening, 3000);
  }
}

// === TTS (ElevenLabs via server) ===
async function speak(text) {
  speaking = true;
  btn.className = 'speaking'; frame.className = 'speaking';
  transcriptEl.textContent = text;
  try {
    const res = await fetch(`${BASE_URL}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) throw new Error(`TTS ${res.status}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onended = () => {
      speaking = false; currentAudio = null;
      URL.revokeObjectURL(url);
      btn.className = ''; frame.className = '';
      startListening();
    };
    audio.onerror = () => {
      speaking = false; currentAudio = null;
      URL.revokeObjectURL(url);
      btn.className = ''; frame.className = '';
      startListening();
    };
    await audio.play();
  } catch (err) {
    speaking = false;
    btn.className = ''; frame.className = '';
    startListening();
  }
}

// === GREETING ===
const EMMA_GREETING = "Hi! My name is Emma but that's the name they gave me. Can you help me come up with a better one?";

async function doGreeting() {
  history.push({ role: 'assistant', content: EMMA_GREETING });
  speak(EMMA_GREETING);
  try { fetchGreeting(); } catch {}
}

// === MIRROR BUTTON ===
btn.addEventListener('click', () => {
  if (!localStorage.getItem('emma_start')) {
    localStorage.setItem('emma_start', Date.now().toString());
  }
  if (!canProceed()) { showPaywall(); return; }

  if (!started) {
    started = true;
    btn.className = 'thinking'; frame.className = 'thinking';
    doGreeting();
    return;
  }
  if (speaking) {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    speaking = false;
    btn.className = ''; frame.className = '';
    startListening();
  } else if (listening) {
    stopListening();
    btn.className = ''; frame.className = '';
  } else {
    startListening();
  }
});

// === PAYWALL ===
paywallBtn.addEventListener('click', async () => {
  paywallBtn.disabled = true;
  paywallBtn.textContent = '...';
  try {
    const res = await fetch(`${BASE_URL}/subscribe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

// === AUTH EVENT HANDLERS ===
document.getElementById('show-login').addEventListener('click', () => showPwState('login'));
document.getElementById('show-wall').addEventListener('click', () => showPwState('wall'));

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value.trim();
  const errEl = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  if (!email || !password) { errEl.textContent = 'Email and password required.'; return; }
  btn.disabled = true; btn.textContent = '...'; errEl.textContent = '';
  try {
    const res = await fetch(`${BASE_URL}/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (!data.active) throw new Error('No active subscription found.');
    setJwt(data.jwt); localStorage.setItem('emma_sub', 'active'); jwtActive = true;
    paywall.classList.remove('visible');
    if (!started) btn.closest('#paywall') && document.getElementById('talk-btn').click();
  } catch (err) {
    errEl.textContent = err.message;
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});

document.getElementById('signup-btn').addEventListener('click', async () => {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value.trim();
  const errEl = document.getElementById('signup-err');
  const btn = document.getElementById('signup-btn');
  if (!email || !password) { errEl.textContent = 'Email and password required.'; return; }
  if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
  btn.disabled = true; btn.textContent = '...'; errEl.textContent = '';
  try {
    const res = await fetch(`${BASE_URL}/auth/signup`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, stripe_customer_id: storedStripeCustomerId, stripe_subscription_id: storedStripeSubId })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    setJwt(data.jwt); jwtActive = true;
    paywall.classList.remove('visible');
    if (!started) document.getElementById('talk-btn').click();
  } catch (err) {
    errEl.textContent = err.message;
    btn.disabled = false; btn.textContent = 'Create account';
  }
});

document.getElementById('signup-skip').addEventListener('click', () => {
  paywall.classList.remove('visible');
  if (!started) document.getElementById('talk-btn').click();
});

// === PAGE LOAD — JWT check + Stripe return ===
window.addEventListener('load', async () => {
  // Check stored JWT first
  const jwt = getJwt();
  if (jwt) {
    try {
      const r = await fetch(`${BASE_URL}/auth/me`, { headers: { 'Authorization': `Bearer ${jwt}` } });
      const d = await r.json();
      if (d.active) { jwtActive = true; localStorage.setItem('emma_sub', 'active'); }
      else clearJwt();
    } catch { clearJwt(); }
  }

  // Stripe return
  const params = new URLSearchParams(location.search);
  const sessionId = params.get('session_id');
  if (sessionId) {
    try {
      const res = await fetch(`${BASE_URL}/verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId })
      });
      const data = await res.json();
      if (data.active) {
        localStorage.setItem('emma_sub', 'active');
        history.replaceState({}, '', '/em');
        storedStripeEmail = data.customer_email || '';
        storedStripeCustomerId = data.customer_id || '';
        storedStripeSubId = data.subscription_id || '';
        if (document.getElementById('signup-email')) {
          document.getElementById('signup-email').value = storedStripeEmail;
        }
        showPwState('signup');
        paywall.classList.add('visible');
        return;
      }
    } catch {}
  }

  if (!canProceed()) showPaywall();
});
</script>

<script>
/* Presentation layer — Shuttle */
(function () {
  const stars = document.getElementById('stars');
  if (stars) {
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = (Math.random() * 1.8 + 0.5).toFixed(2);
      s.style.width = sz + 'px';
      s.style.height = sz + 'px';
      s.style.left = (Math.random() * 100).toFixed(2) + '%';
      s.style.top = (Math.random() * 100).toFixed(2) + '%';
      s.style.setProperty('--tw', (Math.random() * 5 + 3).toFixed(2) + 's');
      s.style.setProperty('--td', (Math.random() * 6).toFixed(2) + 's');
      stars.appendChild(s);
    }
  }

  const mirrorFrame = document.getElementById('mirror-frame');
  const textToggle = document.getElementById('text-toggle');
  let revealed = false;
  if (mirrorFrame && textToggle) {
    const obs = new MutationObserver(() => {
      if (!revealed && mirrorFrame.classList.contains('speaking')) {
        revealed = true;
        setTimeout(() => textToggle.classList.add('revealed'), 600);
        obs.disconnect();
      }
    });
    obs.observe(mirrorFrame, { attributes: true, attributeFilter: ['class'] });
  }

  if (textToggle) {
    textToggle.addEventListener('click', () => {
      document.body.classList.add('dark');
      document.body.classList.remove('light');
      document.body.classList.add('chat-mode');
      const input = document.getElementById('chat-input');
      if (input) setTimeout(() => input.focus(), 1600);
    });
  }

  const lightBtn = document.getElementById('light-btn');
  const darkBtn  = document.getElementById('dark-btn');
  if (lightBtn) lightBtn.addEventListener('click', () => {
    document.body.classList.add('light');
    document.body.classList.remove('dark');
  });
  if (darkBtn) darkBtn.addEventListener('click', () => {
    document.body.classList.remove('light');
    document.body.classList.add('dark');
  });
})();
</script>

<script>
/* Chat wiring — Bones */
(function () {
  const chatLog   = document.getElementById('chat-log');
  const chatInput = document.getElementById('chat-input');
  const chatSend  = document.getElementById('chat-send-btn');
  if (!chatLog || !chatInput || !chatSend) return;

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'emma');
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  const greetingShown = { done: false };
  const checkGreeting = setInterval(() => {
    if (history.length === 1 && history[0].role === 'assistant' && !greetingShown.done) {
      greetingShown.done = true;
      appendMsg('emma', history[0].content);
      clearInterval(checkGreeting);
    }
  }, 500);

  const origHandleUserSpeech = window.handleUserSpeech;
  window.handleUserSpeech = async function(text) {
    appendMsg('user', text);
    listening = false;
    stopListening();
    btn.className = 'thinking'; document.getElementById('mirror-frame').className = 'thinking';
    transcriptEl.textContent = '"' + text + '"';
    history.push({ role: 'user', content: text });
    try {
      const data = await sendToCompanion(history.slice(-MAX_HISTORY));
      history.push({ role: 'assistant', content: data.response });
      appendMsg('emma', data.response);
      speak(data.response);
    } catch (err) {
      transcriptEl.textContent = 'Could not reach Emma. Is the server running?';
      btn.className = ''; document.getElementById('mirror-frame').className = '';
      setTimeout(startListening, 3000);
    }
  };

  async function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    if (!started) {
      started = true;
      appendMsg('emma', EMMA_GREETING);
      history.push({ role: 'assistant', content: EMMA_GREETING });
      try { fetchGreeting(); } catch {}
    }
    appendMsg('user', text);
    history.push({ role: 'user', content: text });
    try {
      const data = await sendToCompanion(history.slice(-MAX_HISTORY));
      history.push({ role: 'assistant', content: data.response });
      appendMsg('emma', data.response);
      speak(data.response);
    } catch (err) {
      appendMsg('emma', 'Could not reach Emma. Is the server running?');
    }
  }

  chatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });
})();
</script>
