<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Emma</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Georgia', 'Times New Roman', serif;
  background: #0a0806;
  color: #d4c4a0;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.4rem;
  padding: 2rem 1.5rem;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Victorian Mirror ── */
#mirror-ring {
  position: relative;
  flex-shrink: 0;
}

/* Outermost decorative ring */
#mirror-ring::before {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: conic-gradient(
    #8b6508 0deg,   #f5d060 20deg,  #c9a020 40deg,
    #f0c840 60deg,  #8b6508 80deg,  #f5d060 100deg,
    #c9a020 120deg, #f0c840 140deg, #8b6508 160deg,
    #f5d060 180deg, #c9a020 200deg, #f0c840 220deg,
    #8b6508 240deg, #f5d060 260deg, #c9a020 280deg,
    #f0c840 300deg, #8b6508 320deg, #f5d060 340deg,
    #c9a020 360deg
  );
  z-index: 0;
}

/* Dark fill behind inner frame */
#mirror-ring::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  background: #0a0806;
  z-index: 1;
}

#mirror {
  position: relative;
  z-index: 2;
  width: 230px;
  height: 230px;
  border-radius: 50%;
  border: 6px solid #c9a84c;
  box-shadow:
    0 0 0 1px #6b4e00,
    0 0 0 3px #e8b830,
    0 0 0 5px #6b4e00,
    inset 0 0 0 1px rgba(201,168,76,0.25),
    inset 0 0 40px rgba(0,0,0,0.6);
  background:
    radial-gradient(ellipse at 32% 26%, rgba(255,252,230,0.14) 0%, transparent 48%),
    radial-gradient(ellipse at 68% 72%, rgba(180,155,100,0.06) 0%, transparent 42%),
    linear-gradient(155deg, #1c1610 0%, #0d0a07 55%, #181209 100%);
  cursor: pointer;
  outline: none;
  border: none;
  touch-action: manipulation;
  transition: box-shadow 0.5s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#mirror:active { transform: scale(0.98); }

/* Shimmer layer inside glass */
.shimmer {
  position: absolute;
  width: 55%;
  height: 55%;
  top: 12%;
  left: 16%;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,252,235,0.11) 0%, transparent 70%);
  pointer-events: none;
  animation: glimmer 7s ease-in-out infinite;
}

@keyframes glimmer {
  0%, 100% { opacity: 0.5; transform: scale(1) translateY(0); }
  40%       { opacity: 1;   transform: scale(1.05) translateY(-3px); }
  70%       { opacity: 0.7; transform: scale(0.97) translateY(2px); }
}

/* State: idle — gentle breathe */
#mirror.idle {
  animation: breathe 5s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 0 0 1px #6b4e00, 0 0 0 3px #e8b830, 0 0 0 5px #6b4e00, inset 0 0 0 1px rgba(201,168,76,0.25), inset 0 0 40px rgba(0,0,0,0.6), 0 0 18px rgba(201,168,76,0); }
  50%       { box-shadow: 0 0 0 1px #6b4e00, 0 0 0 3px #e8b830, 0 0 0 5px #6b4e00, inset 0 0 0 1px rgba(201,168,76,0.25), inset 0 0 40px rgba(0,0,0,0.6), 0 0 28px rgba(201,168,76,0.18); }
}

/* State: thinking */
#mirror.thinking {
  animation: none;
  box-shadow: 0 0 0 1px #6b4e00, 0 0 0 3px #b8920a, 0 0 0 5px #6b4e00, inset 0 0 0 1px rgba(150,120,50,0.2), inset 0 0 60px rgba(0,0,0,0.8), 0 0 20px rgba(150,120,50,0.1);
  opacity: 0.75;
}

/* State: listening */
#mirror.listening {
  animation: listen-pulse 2s ease-in-out infinite;
}
@keyframes listen-pulse {
  0%, 100% { box-shadow: 0 0 0 1px #2a6040, 0 0 0 4px #4a9060, 0 0 0 6px #2a6040, inset 0 0 0 1px rgba(80,180,120,0.2), inset 0 0 40px rgba(0,0,0,0.6), 0 0 0 rgba(80,180,120,0); }
  50%       { box-shadow: 0 0 0 1px #2a6040, 0 0 0 4px #4a9060, 0 0 0 6px #2a6040, inset 0 0 0 1px rgba(80,180,120,0.2), inset 0 0 40px rgba(0,0,0,0.6), 0 0 24px rgba(80,180,120,0.2); }
}

/* State: speaking */
#mirror.speaking {
  animation: speak-glow 1.8s ease-in-out infinite;
}
@keyframes speak-glow {
  0%, 100% { box-shadow: 0 0 0 1px #6b4e00, 0 0 0 4px #f5d060, 0 0 0 7px #6b4e00, inset 0 0 0 1px rgba(240,200,80,0.3), inset 0 0 30px rgba(0,0,0,0.5), 0 0 20px rgba(240,200,80,0.15); }
  50%       { box-shadow: 0 0 0 1px #6b4e00, 0 0 0 4px #f5d060, 0 0 0 7px #6b4e00, inset 0 0 0 1px rgba(240,200,80,0.3), inset 0 0 30px rgba(0,0,0,0.5), 0 0 40px rgba(240,200,80,0.28); }
}

/* Decorative corner dots on the outer ring */
.ring-dot {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: radial-gradient(#f5d060, #c9a020);
  z-index: 3;
}
.ring-dot.top    { top: -14px;  left: 50%; transform: translateX(-50%); }
.ring-dot.right  { right: -14px; top: 50%; transform: translateY(-50%); }
.ring-dot.bottom { bottom: -14px; left: 50%; transform: translateX(-50%); }
.ring-dot.left   { left: -14px; top: 50%; transform: translateY(-50%); }


/* ── Transcript ── */
#transcript {
  font-size: 18px;
  color: #c8b890;
  text-align: center;
  max-width: 500px;
  width: 100%;
  min-height: 4.5rem;
  line-height: 1.7;
  font-style: italic;
  padding: 0 0.5rem;
}

/* ── Text fallback (iOS / no-speech) ── */
#text-mode {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  width: 100%;
  max-width: 420px;
}

#text-input {
  width: 100%;
  font-size: 17px;
  padding: 0.65rem 0.9rem;
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 8px;
  background: rgba(255,248,220,0.04);
  color: #d4c4a0;
  font-family: 'Georgia', serif;
  outline: none;
}
#text-input:focus { border-color: rgba(201,168,76,0.5); }
#text-input::placeholder { color: rgba(180,160,120,0.3); }

#text-send {
  width: 100%;
  font-size: 17px;
  padding: 0.65rem;
  border-radius: 8px;
  border: 1px solid rgba(201,168,76,0.3);
  background: rgba(201,168,76,0.08);
  color: #d4c4a0;
  cursor: pointer;
  font-family: 'Georgia', serif;
  letter-spacing: 0.06em;
  touch-action: manipulation;
}
#text-send:active { opacity: 0.6; }

/* ── Payment Wall ── */
#paywall {
  display: none;
  position: fixed;
  inset: 0;
  background: #0a0806;
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  padding: 2rem 1.5rem;
  text-align: center;
}
#paywall.visible { display: flex; }
#paywall-title {
  font-size: 22px;
  color: #c9a84c;
  letter-spacing: 0.06em;
}
#paywall-sub {
  font-size: 15px;
  color: rgba(180,160,120,0.6);
  line-height: 1.7;
  max-width: 320px;
  font-family: -apple-system, sans-serif;
  font-weight: 300;
}
#paywall-email {
  width: 100%;
  max-width: 320px;
  font-size: 17px;
  padding: 0.7rem 0.9rem;
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 8px;
  background: rgba(255,248,220,0.04);
  color: #d4c4a0;
  font-family: 'Georgia', serif;
  outline: none;
  text-align: center;
}
#paywall-email:focus { border-color: rgba(201,168,76,0.55); }
#paywall-email::placeholder { color: rgba(180,160,120,0.3); }
#paywall-btn {
  width: 100%;
  max-width: 320px;
  font-size: 17px;
  padding: 0.75rem;
  border-radius: 8px;
  border: 1px solid rgba(201,168,76,0.4);
  background: rgba(201,168,76,0.1);
  color: #d4c4a0;
  cursor: pointer;
  font-family: 'Georgia', serif;
  letter-spacing: 0.06em;
  touch-action: manipulation;
}
#paywall-btn:active { opacity: 0.6; }
#paywall-btn:disabled { opacity: 0.4; cursor: default; }
#paywall-note {
  font-size: 12px;
  color: rgba(180,160,120,0.3);
  font-family: -apple-system, sans-serif;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<div id="paywall">
  <div id="paywall-title">Your mirror has gone still.</div>
  <div id="paywall-sub">Your 30 days with Emma have come to an end.<br>To continue, $4.99 / month.</div>
  <input id="paywall-email" type="email" placeholder="your email" autocomplete="email" />
  <button id="paywall-btn">Continue — $4.99 / month</button>
  <div id="paywall-note">Secure checkout via Stripe. Cancel anytime.</div>
</div>

<div id="mirror-ring">
  <span class="ring-dot top"></span>
  <span class="ring-dot right"></span>
  <span class="ring-dot bottom"></span>
  <span class="ring-dot left"></span>
  <button id="mirror" class="idle" aria-label="Talk to Emma">
    <div class="shimmer"></div>
  </button>
</div>


<div id="text-mode">
  <input id="text-input" type="text" placeholder="write something..." autocomplete="off" />
  <button id="text-send">send</button>
</div>

<div id="transcript"></div>

<script>
const BASE_URL = location.origin;
const LOCKED_GREETING = "Hi! My name is Emma but that's the name they gave me. Can you help me come up with a better one?";
const TRIAL_MS = 30 * 24 * 60 * 60 * 1000;

let started = false;
let listening = false;
let speaking = false;
let recognition = null;
let currentAudio = null;
let history = [];
let speechSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

const mirror      = document.getElementById('mirror');
const transcriptEl= document.getElementById('transcript');
const textMode    = document.getElementById('text-mode');
const textInput   = document.getElementById('text-input');
const textSend    = document.getElementById('text-send');
const paywall     = document.getElementById('paywall');
const paywallBtn  = document.getElementById('paywall-btn');
const paywallEmail= document.getElementById('paywall-email');

if (!speechSupported) {
  textMode.style.display = 'flex';
}

// ── Trial / Subscription ──
function isTrialExpired() {
  const start = localStorage.getItem('emma_start');
  if (!start) return false;
  return Date.now() - parseInt(start, 10) > TRIAL_MS;
}

function isSubscribed() {
  return localStorage.getItem('emma_sub') === 'active';
}

function showPaywall() {
  paywall.classList.add('visible');
}

function canProceed() {
  return !isTrialExpired() || isSubscribed();
}

// ── State ──
function setState(s) {
  mirror.className = s;
}

// ── Speech Recognition ──
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.continuous = false;
  rec.interimResults = true;
  rec.lang = 'en-US';

  rec.onstart  = () => { listening = true; setState('listening'); };

  rec.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (interim) transcriptEl.textContent = interim;
    if (final) handleInput(final.trim());
  };

  rec.onerror = (e) => {
    if (e.error === 'no-speech') { if (listening) startListening(); return; }
    listening = false;
    setState('idle');
  };

  rec.onend = () => {
    if (listening && !speaking) startListening();
    else if (!speaking) setState('idle');
  };

  return rec;
}

function startListening() {
  if (!recognition) recognition = setupRecognition();
  if (!recognition) return;
  listening = true;
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  listening = false;
  if (recognition) try { recognition.stop(); } catch(e) {}
  setState('idle');
}

// ── API ──
async function handleInput(text) {
  if (!text.trim()) return;
  listening = false;
  if (recognition) try { recognition.stop(); } catch(e) {}
  setState('thinking');
  transcriptEl.textContent = text;
  textInput.value = '';

  history.push({ role: 'user', content: text });

  try {
    const res = await fetch(`${BASE_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.slice(-20) })
    });
    const data = await res.json();
    history.push({ role: 'assistant', content: data.response });
    speak(data.response);
  } catch(err) {
    setState('idle');
    transcriptEl.textContent = 'Try again in a moment.';
    if (speechSupported) setTimeout(startListening, 2000);
  }
}

// ── TTS via ElevenLabs ──
async function speak(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  speaking = true;
  setState('speaking');
  transcriptEl.textContent = text;

  try {
    const res = await fetch(`${BASE_URL}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) throw new Error('TTS failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => {
      speaking = false;
      currentAudio = null;
      URL.revokeObjectURL(url);
      setState('idle');
      if (speechSupported) startListening();
    };
    currentAudio.onerror = () => {
      speaking = false;
      currentAudio = null;
      URL.revokeObjectURL(url);
      setState('idle');
      if (speechSupported) startListening();
    };
    currentAudio.play();
  } catch(err) {
    speaking = false;
    setState('idle');
    transcriptEl.textContent = text;
    if (speechSupported) startListening();
  }
}

// ── Greeting ──
async function doGreeting() {
  setState('thinking');
  try {
    const res = await fetch(`${BASE_URL}/greeting`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });
    const data = await res.json();
    const text = data.response || LOCKED_GREETING;
    history.push({ role: 'assistant', content: text });
    speak(text);
  } catch(err) {
    history.push({ role: 'assistant', content: LOCKED_GREETING });
    speak(LOCKED_GREETING);
  }
}

// ── Controls ──
mirror.addEventListener('click', () => {
  // Mark trial start on first ever tap
  if (!localStorage.getItem('emma_start')) {
    localStorage.setItem('emma_start', Date.now().toString());
  }

  if (!canProceed()) { showPaywall(); return; }

  if (!started) { started = true; doGreeting(); return; }
  if (speaking) {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    speaking = false;
    setState('idle');
    if (speechSupported) startListening();
  } else if (listening) {
    stopListening();
  } else {
    startListening();
  }
});

textSend.addEventListener('click', () => {
  if (!canProceed()) { showPaywall(); return; }
  if (!started) started = true;
  const t = textInput.value.trim();
  if (t) handleInput(t);
});
textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!canProceed()) { showPaywall(); return; }
    if (!started) started = true;
    const t = textInput.value.trim();
    if (t) handleInput(t);
  }
});

// ── Paywall ──
paywallBtn.addEventListener('click', async () => {
  const email = paywallEmail.value.trim();
  if (!email) { paywallEmail.focus(); return; }
  paywallBtn.disabled = true;
  paywallBtn.textContent = '...';
  try {
    const res = await fetch(`${BASE_URL}/subscribe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      throw new Error('no url');
    }
  } catch {
    paywallBtn.disabled = false;
    paywallBtn.textContent = 'Continue — $4.99 / month';
  }
});

paywallEmail.addEventListener('keydown', e => {
  if (e.key === 'Enter') paywallBtn.click();
});

// ── Page Load — handle Stripe return + iOS text mode ──
window.addEventListener('load', async () => {
  const params = new URLSearchParams(location.search);
  const sessionId = params.get('session_id');
  if (sessionId) {
    try {
      const res = await fetch(`${BASE_URL}/verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId })
      });
      const data = await res.json();
      if (data.active) {
        localStorage.setItem('emma_sub', 'active');
        history.replaceState({}, '', '/em');
      }
    } catch {}
  }

  // Auto-greet for text mode (iOS/no-speech)
  if (!speechSupported) {
    if (canProceed()) {
      if (!localStorage.getItem('emma_start')) {
        localStorage.setItem('emma_start', Date.now().toString());
      }
      started = true;
      doGreeting();
    } else {
      showPaywall();
    }
  }
});
</script>
</body>
</html>
